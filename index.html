<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>42 Project Hub</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <h1>42 Project Hub</h1>
        <div id="user-profile">
            <button id="login-btn" class="tab-button">Login con 42</button>
            <button id="filter-my-projects" class="tab-button" style="display:none;">Mis Proyectos</button>
        </div>
        <nav class="tabs">
            <button class="tab-button active" data-tab="42-projects">42 Projects</button>
            <button class="tab-button" data-tab="other-projects">Other Projects</button>
            <button class="tab-button" data-tab="submit-project">Submit Project</button>
        </nav>
    </header>

    <main>
        <section id="42-projects" class="tab-content active">
            <h2>Proyectos de la Comunidad 42</h2>
            <div id="loading-42" class="loading"><div class="spinner"></div>Cargando proyectos...</div>
            <div class="project-grid" id="grid-42-projects">
                <!-- Proyectos de 42 se cargarán aquí -->
            </div>
        </section>

        <section id="other-projects" class="tab-content">
            <h2>Otros Proyectos Open Source</h2>
            <div id="loading-other" class="loading"><div class="spinner"></div>Cargando proyectos...</div>
            <div class="project-grid" id="grid-other-projects">
                <!-- Otros proyectos se cargarán aquí -->
            </div>
        </section>

        <section id="submit-project" class="tab-content">
            <h2>Enviar un Nuevo Proyecto</h2>
            <form id="submit-form">
                <label for="repo-url">URL del Repositorio de GitHub:</label>
                <input type="url" id="repo-url" name="repo-url" placeholder="https://github.com/usuario/repo" required>

                <label for="project-category">Categoría:</label>
                <select id="project-category" name="project-category" required>
                    <option value="42">42 Project</option>
                    <option value="other">Other Project</option>
                </select>

                <label for="project-title">Título del Proyecto (opcional):</label>
                <input type="text" id="project-title" name="project-title" placeholder="Mi Proyecto Cool">

                <label for="project-description">Descripción (opcional):</label>
                <textarea id="project-description" name="project-description" rows="4" placeholder="Una breve descripción de tu proyecto."></textarea>

                <button type="submit">Enviar Proyecto</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 42 Project Hub</p>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/submit.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
